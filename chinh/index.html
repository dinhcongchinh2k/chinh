<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2f3347">
<meta name="mobile-web-app-capable" content="yes">

<!-- VIEWPORT -->
<meta name="viewport"
      content="width=device-width,
               initial-scale=1,
               maximum-scale=1,
               user-scalable=no">

<title>QR Access</title>

<style>

/* GLOBAL FIX */
*{ box-sizing:border-box; }

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#2f3347;
}

body{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    font-family:Arial,sans-serif;
    text-align:center;
    color:#fff;
    padding-top: 50px; 
}

/* NAME */
.name{
    margin:0px 0 18px;
    font-size:20px;
    font-weight:bold;
    color:#f0d58c;
    white-space: nowrap;
}

/* CARD */
.card{
    width:97%;
    max-width:320px;
    margin:0 auto;
    background:#fff;
    border-radius:22px;
    padding-bottom:24px;
    color:#000;
    overflow:hidden;
}

/* HEADER */
.card-header {
    position: relative;
    background: #ffb703;
    color: #fff;
    /* 1. Dịch chữ về bên trái */
    text-align: left; 
    /* 2. Tăng padding bên trái để chữ không sát mép (hiện tại là 12px, có thể tăng lên 20px) */
    padding: 8px 14px; 
    /* 3. Chỉnh chữ to hơn (hiện tại là 16px, bạn hãy thử 20px hoặc 22px) */
    font-size: 17px; 
    /* Thêm dòng này nếu muốn chữ đậm hơn */
    font-weight: normal
}


.card-header::before,
.card-header::after{
    content:"";
    position:absolute;
    bottom:-7px;
    width:14px;
    height:14px;
    background:#2f3347;
    border-radius:50%;
}
.card-header::before{ left:-7px; }
.card-header::after{ right:-7px; }

/* DATETIME */
.datetime{
    margin:22px 0 16px;
    font-size:18px;
    font-weight:bold;
    white-space:normal;
    word-break:break-word;
}

/* QR */
.qr{
    margin:8px auto;
    width:90%;
    max-width:230px;
    position:relative;
}

.qr img{
    width:100%;
    display:block;
    transition:opacity .3s ease;
}

/* LOADING */
.qr-loading{
    position:absolute;
    top:50%;
    left:50%;
    width:30px;
    height:30px;
    margin:-15px;
    border:3px solid rgba(0,0,0,.25);
    border-top-color:#ffb703;
    border-radius:50%;
    animation:spin .8s linear infinite;
    display:none;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

/* REFRESH */
.refresh{
    margin-top:10px;
    color:#888;
    font-size:17px;
}

.effective-text {
    color: #2ECC71; /* Màu xanh lá sáng */
    font-weight: bold;
    text-align: center;
    font-size: 1.2rem;
    margin-top: 5px;
    /* Lệnh tạo hiệu ứng nháy */
    animation: blinker 1s linear infinite;
}

@keyframes blinker {
    50% {
        opacity: 0; /* Làm mờ đi 50% thời gian */
    }
}

/* TIMER */
.timer{
    margin-top:8px;
    font-size:15px;
    font-weight: normal;
    color:#2ecc71;
}

/* NOTE */
.note{
    margin:24px auto;
    max-width:300px;
    font-size:14px;
    color:#bfc3d9;
    line-height:1.85;
    text-align:left;
}
.note .line{ display:block; }

</style>
</head>

<body>

<div class="name">
Lại Thị Tuyết Ngân (V26031206)
</div>

<div class="card">

    <div class="card-header">
   Your device has met the safety regulations, please scan the code
    </div>

    <div class="datetime" id="datetime"></div>

    <div class="qr">
        <img id="qrImage" src="qr.png">
        <div class="qr-loading" id="qrLoading"></div>
    </div>

    <div class="refresh" onclick="refreshQR()">Refresh QR code</div>

<div class="effective-text">Effective</div>

    <div class="timer" id="timer">00:00:00</div>

</div>

<div class="note">
    <span class="line">尊敬的员工您好，您已进入企业涉密区域，</span>
    <span class="line">出于企业安全考虑，您的手机摄像头将被禁止，</span>
    <span class="line">感谢您的配合。</span>
</div>

<script>

/* DATE TIME */
function updateDateTime(){
    const n=new Date();
    document.getElementById("datetime").innerText=
        n.getFullYear()+"-"+
        String(n.getMonth()+1).padStart(2,"0")+"-"+
        String(n.getDate()).padStart(2,"0")+" "+
        String(n.getHours()).padStart(2,"0")+":"+
        String(n.getMinutes()).padStart(2,"0")+":"+
        String(n.getSeconds()).padStart(2,"0");
}
setInterval(updateDateTime,1000);
updateDateTime();

/* TIMER */
let seconds=0;
setInterval(()=>{
    seconds++;
    renderTimer();
},1000);

function renderTimer(){
    document.getElementById("timer").innerText=
        String(Math.floor(seconds/3600)).padStart(2,"0")+":"+
        String(Math.floor((seconds%3600)/60)).padStart(2,"0")+":"+
        String(seconds%60).padStart(2,"0");
}

/* CLICK 3 TIMES */
let clickCount=0;
let step=0;
const steps=[2*3600+30*60,5*3600,8*3600,0];

document.querySelector(".name").onclick=()=>{
    clickCount++;
    if(clickCount===3){
        seconds=steps[step];
        renderTimer();
        step=(step+1)%steps.length;
        clickCount=0;
    }
};

/* REFRESH QR */
function refreshQR() {
    const img = document.getElementById("qrImage");
    const loading = document.getElementById("qrLoading");

    img.style.opacity = "0.4";
    loading.style.display = "block";

    setTimeout(() => {
        // Kiểm tra: nếu đang là qr.png thì đổi sang qr2.png, ngược lại thì về qr.png
        if (img.src.includes("qr.png")) {
            img.src = "qr2.png?t=" + Date.now();
        } else {
            img.src = "qr.png?t=" + Date.now();
        }
        
        img.style.opacity = "1";
        loading.style.display = "none";
    }, 600);
}


/* BLOCK ZOOM */
document.addEventListener('touchmove', function(e){
    if(e.scale && e.scale !== 1){
        e.preventDefault();
    }
}, { passive:false });

let lastTouchEnd=0;
document.addEventListener('touchend', function(e){
    const now=Date.now();
    if(now-lastTouchEnd<=300){
        e.preventDefault();
    }
    lastTouchEnd=now;
}, false);

/* REGISTER SERVICE WORKER (PWA) */
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
}

</script>

</body>
</html>
